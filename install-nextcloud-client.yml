---
- name: Installation et configuration du client Nextcloud
  hosts: all
  become: true

  tasks:

    - name: Installer le client Nextcloud
      apt:
        name: nextcloud-desktop
        state: present
        update_cache: yes

    - name: Déployer le déclencheur autostart Nextcloud client
      copy:
        dest: /etc/X11/Xsession.d/97-nextcloud-client-setup
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          FLAG="$HOME/.config/.nextcloud_configured"
          if [ ! -f "$FLAG" ]; then
            mkdir -p "$HOME/.config/autostart"
            cat > "$HOME/.config/autostart/nextcloud-client.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Nextcloud
          Exec=nextcloud
          Hidden=false
          NoDisplay=false
          X-GNOME-Autostart-enabled=true
          EOF
            touch "$FLAG"
          fi
