---
- name: Configuration des postes OS elementaire
  hosts: all
  become: yes

  tasks:

    - name: Mise a jour des depots
      apt:
        update_cache: yes

    - name: Installation du client FreeIPA
      apt:
        name: freeipa-client
        state: present

    - name: Désinstaller le client FreeIPA si déjà présent
      command: ipa-client-install --uninstall --unattended
      ignore_errors: yes
      args:
        removes: /etc/ipa/default.conf

    - name: Jonction au domaine FreeIPA
      command: >
        ipa-client-install --unattended --mkhomedir
        --server={{ ipa_server_url }}
        --domain={{ ipa_domain }}
        --realm={{ ipa_realm }}
        --principal={{ ipa_admin_user }}
        --password={{ ipa_admin_password }}
      args:
        creates: /etc/ipa/default.conf

    - name: Activer la saisie manuelle du login
      copy:
        dest: /etc/lightdm/lightdm.conf.d/90-manual-login.conf
        content: |
          [Seat:*]
          greeter-show-manual-login=true
        mode: '0644'

    - name: Redemarrer le service graphique
      service:
        name: lightdm
        state: restarted

    - name: Déployer le déclencheur Xsession.d pour autostart Nextcloud
      copy:
        dest: /etc/X11/Xsession.d/98-nextcloud-firstlogin
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          FLAG="$HOME/.config/.nextcloud_opened"
          if [ ! -f "$FLAG" ]; then
            mkdir -p "$HOME/.config/autostart"
            cat > "$HOME/.config/autostart/nextcloud-firstlogin.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Nextcloud First Login
          Exec=bash -c 'sleep 5 && xdg-open "https://cloud.test.gca-formation.fr"'
          Hidden=false
          NoDisplay=false
          X-GNOME-Autostart-enabled=true
          EOF
            touch "$FLAG"
          fi
