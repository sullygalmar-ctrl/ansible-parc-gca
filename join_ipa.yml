---
- name: Configuration des postes OS elementaire
  hosts: all
  become: yes

  tasks:
    - name: Mise a jour des depots
      apt:
        update_cache: yes

    - name: Installation du client FreeIPA
      apt:
        name: freeipa-client
        state: present

    - name: Jonction au domaine FreeIPA
      command: >
        ipa-client-install --unattended --mkhomedir
        --server={{ ipa_server_url }}
        --domain={{ ipa_domain }}
        --realm={{ ipa_realm }}
        --principal={{ ipa_admin_user }}
        --password={{ ipa_admin_password }}
      args:
        creates: /etc/ipa/default.conf

    - name: Activer la saisie manuelle du login
      copy:
        dest: /etc/lightdm/lightdm.conf.d/90-manual-login.conf
        content: |
          [Seat:*]
          greeter-show-manual-login=true
        mode: '0644'

    - name: Redemarrer le service graphique pour appliquer les changements
      service:
        name: lightdm
        state: restarted

    - name: Configurer PAM pour mieux gerer les changements de mots de passe
      shell: pam-auth-update --package --enable sssd mkhomedir

    - name: Configurer SSSD pour autoriser le changement de mot de passe offline
      ini_file:
        path: /etc/sssd/sssd.conf
        section: pam
        option: pwd_expiration_warning
        value: "7"
        mode: '0600'
      notify: Redemarrer SSSD

      handlers:
        - name: Redemarrer SSSD
          service:
            name: sssd
            state: restarted
