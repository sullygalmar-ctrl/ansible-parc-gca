---
- name: Déploiement changement mot de passe premier login
  hosts: all
  become: true

  tasks:

    - name: Copier le script principal
      copy:
        src: files/first-login-pwchange.sh
        dest: /usr/local/bin/first-login-pwchange.sh
        owner: root
        group: root
        mode: "0755"

    - name: Déployer le déclencheur via profile.d
      copy:
        dest: /etc/profile.d/first-login-pwchange.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          # Déclencheur au login - crée le .desktop autostart si absent
          if [ -n "$DISPLAY" ] && [ ! -f "$HOME/.config/.pwchanged" ]; then
            mkdir -p "$HOME/.config/autostart"
            cat > "$HOME/.config/autostart/first-login-pwchange.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=First Login Password Change
          Exec=/usr/local/bin/first-login-pwchange.sh
          Hidden=false
          NoDisplay=true
          X-GNOME-Autostart-enabled=true
          EOF
          fi

    - name: Créer le fichier de log
      file:
        path: /var/log/first-login-pwchange.log
        state: touch
        owner: root
        group: root
        mode: "0666"
