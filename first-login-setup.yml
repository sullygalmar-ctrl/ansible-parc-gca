---
- name: Déploiement changement mot de passe premier login
  hosts: all
  become: true

  tasks:

    - name: Installer zenity si absent
      apt:
        name: zenity
        state: present
        update_cache: false

    - name: Copier le script principal
      copy:
        src: files/first-login-pwchange.sh
        dest: /usr/local/bin/first-login-pwchange.sh
        owner: root
        group: root
        mode: "0755"

    - name: Déployer le déclencheur via Xsession.d
      copy:
        dest: /etc/X11/Xsession.d/99-first-login-pwchange
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          if [ ! -f "$HOME/.config/.pwchanged" ]; then
            mkdir -p "$HOME/.config/autostart"
            cat > "$HOME/.config/autostart/first-login-pwchange.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=First Login Password Change
          Exec=/usr/local/bin/first-login-pwchange.sh
          Hidden=false
          NoDisplay=false
          X-GNOME-Autostart-enabled=true
          X-GNOME-Autostart-Delay=5
          EOF
          fi

    - name: Créer le fichier de log
      file:
        path: /var/log/first-login-pwchange.log
        state: touch
        owner: root
        group: root
        mode: "0666"
